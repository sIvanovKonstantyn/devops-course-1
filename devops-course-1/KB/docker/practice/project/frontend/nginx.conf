server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    location /api/ {
        # Strip /api/ prefix so backend sees /
        rewrite ^/api/(.*)$ /$1 break;

        proxy_pass http://backend:5000/;  # Docker DNS
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}