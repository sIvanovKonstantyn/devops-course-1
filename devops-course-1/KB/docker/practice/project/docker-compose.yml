services:
  backend:
    build: ./backend
    container_name: backend
    networks:
      - app-network
    ports:
      - "5000:5000"

  frontend:
    build: ./frontend
    container_name: frontend
    networks:
      - app-network
    ports:
      - "8080:80"
    depends_on:
      - backend

networks:
  app-network:
    driver: bridge